<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSolve | Free Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-3xl font-bold text-center text-indigo-700">QuickSolve</h1>

        <div class="bg-white p-4 rounded-xl shadow">
            <h2 class="font-bold mb-2 text-indigo-600">Word Counter</h2>
            <textarea id="txt" oninput="doCount()" class="w-full h-24 border p-2 rounded" placeholder="Paste text here..."></textarea>
            <p id="countOut" class="mt-2 text-sm font-bold">Words: 0 | Chars: 0</p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow">
            <h2 class="font-bold mb-2 text-indigo-600">Percentage Calc</h2>
            <input type="number" id="n1" placeholder="Number" class="w-full border p-2 mb-2 rounded">
            <input type="number" id="n2" placeholder="Percentage (%)" class="w-full border p-2 mb-2 rounded">
            <button onclick="doCalc()" class="w-full bg-indigo-600 text-white py-2 rounded font-bold">Calculate</button>
            <p id="res" class="mt-2 text-lg font-bold text-indigo-800"></p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow">
            <h2 class="font-bold mb-2 text-indigo-600">Password Gen</h2>
            <button onclick="doPass()" class="w-full bg-emerald-600 text-white py-2 rounded font-bold">Generate</button>
            <p id="pwOut" class="mt-2 font-mono text-center text-lg break-all"></p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow text-center">
            <h2 class="font-bold mb-2 text-indigo-600">Current UTC Time</h2>
            <p class="font-mono text-xl" id="time"></p>
        </div>
    </div>

    <script>
        function doCount() {
            const v = document.getElementById('txt').value;
            const w = v.trim() ? v.trim().split(/\s+/).length : 0;
            document.getElementById('countOut').innerText = `Words: ${w} | Chars: ${v.length}`;
        }
        function doCalc() {
            const n1 = document.getElementById('n1').value;
            const n2 = document.getElementById('n2').value;
            document.getElementById('res').innerText = `Result: ${(n1 * n2) / 100}`;
        }
        function doPass() {
            document.getElementById('pwOut').innerText = Math.random().toString(36).slice(-10);
        }
        setInterval(() => document.getElementById('time').innerText = new Date().toUTCString().slice(17, 25), 1000);
    </script>
</body>
</html>
